<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | E-commerce product page</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <main class="container">
    <header>
      <nav class="navbar">
        <section class="nav-first">
          <img class="menu-icon" src="images/icon-menu.svg" alt="">
          <div>
            <img class="logo" src="images/logo.svg" alt="Company logo">
          </div>
          <div class="backdrop"></div>
          <div class="nav-links">
            <img class="close-icon" src="images/icon-close.svg" alt="">
            <a href="#">Collections</a>
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
          </div>
        </section>
        <section class="nav-second">
          <div class="cart">
            <img class="cart-icon" src="images/icon-cart.svg" alt="Cart icon">
          </div>
          <div class="avatar">
            <img src="images/image-avatar.png" alt="Avatar">
          </div>
        </section>
      </nav>
    </header>
    <section class="main">
      <div class="default gallery">
        <div class="main-image">
          <img class="active" src="images/image-product-1.jpg" alt="Product image">
          <img src="images/image-product-2.jpg" alt="Product image">
          <img src="images/image-product-3.jpg" alt="Product image">
          <img src="images/image-product-4.jpg" alt="Product image">
        </div>
        <div class="thumb-list">
          <div class="active">
            <img src="images/image-product-1-thumbnail.jpg" alt="Product image thumbnail">
          </div>
          <div>
            <img src="images/image-product-2-thumbnail.jpg" alt="Product image thumbnail">
          </div>
          <div>
            <img src="images/image-product-3-thumbnail.jpg" alt="Product image thumbnail">
          </div>
          <div>
            <img src="images/image-product-4-thumbnail.jpg" alt="Product image thumbnail">
          </div>
        </div>
      </div>
      <div class="lightbox">
        <div class="gallery">
          <div class="main-image">
            <span class="icon-close">
              <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                <path
                  d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z" />
              </svg>
            </span>
            <span class="icon-prev">
              <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 512">
                <path
                  d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L77.3 256 214.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z" />
              </svg>
            </span>
            <span class="icon-next">
              <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 512">
                <path
                  d="M247.1 233.4c12.5 12.5 12.5 32.8 0 45.3l-160 160c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L179.2 256 41.9 118.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l160 160z" />
              </svg>
            </span>
            <img class="active" src="images/image-product-1.jpg" alt="Product image">
            <img src="images/image-product-2.jpg" alt="Product image">
            <img src="images/image-product-3.jpg" alt="Product image">
            <img src="images/image-product-4.jpg" alt="Product image">
          </div>
          <div class="thumb-list">
            <div class="active">
              <img src="images/image-product-1-thumbnail.jpg" alt="Product image thumbnail">
            </div>
            <div>
              <img src="images/image-product-2-thumbnail.jpg" alt="Product image thumbnail">
            </div>
            <div>
              <img src="images/image-product-3-thumbnail.jpg" alt="Product image thumbnail">
            </div>
            <div>
              <img src="images/image-product-4-thumbnail.jpg" alt="Product image thumbnail">
            </div>
          </div>
        </div>
      </div>

      <div class="content">
        <h3>Sneaker Company</h3>
      </div>
      <!-- Sneaker Company
      Fall Limited Edition Sneakers
      These low-profile sneakers are your perfect casual wear companion. Featuring a
      durable rubber outer sole, they’ll withstand everything the weather can offer.
      $125.00
      50%
      $250.00
      0
      Add to cart -->
    </section>
  </main>
  <script src="script.js"></script>
</body>

</html>
